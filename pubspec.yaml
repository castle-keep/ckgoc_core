name: ckgoc_core
description: A Flutter design system package providing reusable UI components, design tokens, and multi-brand themes (CastleKeep & SkyGo).
version: 0.2.0

homepage: https://github.com/castle-keep/ckgoc_core
repository: https://github.com/castle-keep/ckgoc_core

platforms:
  android:
  ios:
  web:
  macos:
  linux:
  windows:

environment:
  sdk: ^3.9.2
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  lucide_icons_flutter: ^3.1.15
  flutter_svg: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/logos/ck/
    - assets/images/logos/skygo/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter/static/Inter_24pt-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter/static/Inter_24pt-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter/static/Inter_24pt-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter/static/Inter_24pt-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter/static/Inter_24pt-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Inter/static/Inter_24pt-Italic.ttf
          style: italic

  # Fonts — uncomment and add asset paths once font files are added.
  # fonts:
  #   - family: CKSans
  #     fonts:
  #       - asset: assets/fonts/castlekeep/CKSans-Regular.ttf
  #       - asset: assets/fonts/castlekeep/CKSans-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/castlekeep/CKSans-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/castlekeep/CKSans-Bold.ttf
  #         weight: 700
  #   - family: SGSans
  #     fonts:
  #       - asset: assets/fonts/skygo/SGSans-Regular.ttf
  #       - asset: assets/fonts/skygo/SGSans-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/skygo/SGSans-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/skygo/SGSans-Bold.ttf
  #         weight: 700
  #       - asset: assets/fonts/skygo/SGSans-ExtraBold.ttf
  #         weight: 800
