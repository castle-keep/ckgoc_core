name: ckgoc_core
description: A Flutter design system package providing reusable UI components, design tokens, and multi-brand themes (CastleKeep & SkyGo).
version: 0.1.1

homepage: https://github.com/castle-keep/ckgoc_core
repository: https://github.com/castle-keep/ckgoc_core

platforms:
  android:
  ios:
  web:
  macos:
  linux:
  windows:

environment:
  sdk: ^3.9.2
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  lucide_icons: ^0.257.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  # Fonts — uncomment and add asset paths once font files are added.
